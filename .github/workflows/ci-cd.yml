name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────
  # Job 1: Lint & Validate
  # ──────────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML files
        run: |
          echo "Checking HTML files exist..."
          for file in index.html shop.html cart.html checkout.html about.html product.html; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              exit 1
            else
              echo "✅ Found: $file"
            fi
          done

      - name: Check for broken internal links
        run: |
          echo "Checking internal links..."
          for file in *.html; do
            echo "Scanning $file..."
            # Check href references to local .html files exist
            grep -oP 'href="(?!http|#|mailto|tel)([^"]+\.html)"' "$file" | \
              sed 's/href="//;s/"//' | while read -r link; do
                if [ ! -f "$link" ]; then
                  echo "❌ Broken link in $file: $link"
                  exit 1
                else
                  echo "  ✅ $link"
                fi
              done
          done

  # ──────────────────────────────────────────
  # Job 2: Test (Playwright)
  # ──────────────────────────────────────────
  test:
    name: Playwright Tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test tests/flow1_test.spec.js

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────
  # Job 3: Deploy to GitHub Pages
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ──────────────────────────────────────────
  # Job 4: Post-Deploy Smoke Test
  # ──────────────────────────────────────────
  smoke-test:
    name: Post-Deploy Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to propagate
        run: sleep 30

      - name: Verify site is live
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tester11222.github.io/Dummy-Website/)
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Site returned $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Site is live and returning 200"

      - name: Check critical pages
        run: |
          PAGES=("" "shop.html" "cart.html" "about.html" "checkout.html")
          for page in "${PAGES[@]}"; do
            URL="https://tester11222.github.io/Dummy-Website/$page"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" -ne 200 ]; then
              echo "❌ $URL returned $STATUS"
              exit 1
            fi
            echo "✅ $URL — 200 OK"
          done
